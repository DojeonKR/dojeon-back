services:
  postgres:
    image: postgres:16-alpine
    container_name: dojeon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dojeon
      POSTGRES_PASSWORD: dojeon_secret
      POSTGRES_DB: dojeon
    ports:
      - "5432:5432"
    volumes:
      - dojeon_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dojeon-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  dojeon_pg_data:
